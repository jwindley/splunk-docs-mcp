name: Crawl and release

on:
  schedule:
    - cron: "0 2 * * 0"   # every Sunday at 02:00 UTC
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # One job per source — crawls in parallel, caches per-source DB incrementally
  # ---------------------------------------------------------------------------
  crawl:
    # A source failing (e.g. site temporarily down) should not block the
    # merge-and-release job — it merges whatever artifacts were uploaded.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        source:
          - enterprise-security
          - enterprise-security-8-4
          - enterprise-security-8-3
          - admin-manual
          - splunk-enterprise
          - splunk-enterprise-10-1
          - splunk-cloud
          - splunk-cloud-10-2
          - lantern

    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Restore per-source DB cache
        uses: actions/cache/restore@v4
        with:
          path: data/${{ matrix.source }}.db
          # Restore from the most recent cache for this source (any run)
          key: splunk-db-${{ matrix.source }}-${{ github.run_id }}
          restore-keys: |
            splunk-db-${{ matrix.source }}-

      - name: Crawl ${{ matrix.source }}
        # --full re-fetches all pages on every run so the index stays current.
        # Pages whose raw HTML hasn't changed are skipped at the extract/embed
        # stage (hash comparison), so only genuinely updated content is re-indexed.
        # Without --full the cached crawl_state causes "Nothing to crawl" on every
        # run after the first, meaning the index is never updated.
        run: uv run splunk-crawl --sources ${{ matrix.source }} --db data/${{ matrix.source }}.db --full

      - name: Save per-source DB cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/${{ matrix.source }}.db
          key: splunk-db-${{ matrix.source }}-${{ github.run_id }}

      - name: Upload per-source DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-${{ matrix.source }}
          path: data/${{ matrix.source }}.db
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Aggregation — merge all per-source DBs, export per-source files, release
  # ---------------------------------------------------------------------------
  merge-and-release:
    needs: [crawl]
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Download all per-source DB artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: db-*
          merge-multiple: true
          path: data/

      - name: Merge per-source DBs
        run: |
          # Build the list of DBs that actually exist — a crawl job may have
          # failed or timed out, leaving its artifact absent. We merge whatever
          # was uploaded rather than failing the whole release.
          DBS=""
          for src in enterprise-security enterprise-security-8-4 enterprise-security-8-3 \
                     admin-manual splunk-enterprise splunk-enterprise-10-1 \
                     splunk-cloud splunk-cloud-10-2 lantern; do
            if [ -f "data/${src}.db" ]; then
              DBS="$DBS data/${src}.db"
            else
              echo "Warning: data/${src}.db not found — skipping (crawl job may have failed)"
            fi
          done
          if [ -z "$DBS" ]; then
            echo "ERROR: no source DBs found — cannot build release"
            exit 1
          fi
          uv run splunk-merge $DBS --output data/splunk_docs.db

      - name: Export per-source DBs and manifest
        run: uv run splunk-merge --export-sources data/export/ --db data/splunk_docs.db

      - name: Set release tag
        id: tag
        run: echo "tag=data-$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Splunk docs index — ${{ steps.tag.outputs.tag }}"
          body: |
            Automated weekly crawl of Splunk documentation.

            **Sources indexed:**
            - Splunk Enterprise Security 8.3, 8.4, 8.5
            - Splunk Enterprise 10.1, 10.2
            - Splunk Cloud Platform 10.2, 10.3.2512
            - Splunk Configuration File Reference 10.2
            - Splunk Lantern (current)

            **Downloads:**
            - `splunk_docs.db` — full merged index (all sources)
            - `splunk_docs_<source>.db` — per-source indexes for selective download
            - `manifest.json` — source list with page counts and file sizes

            Run `uv run splunk-setup` to download the merged index automatically,
            or clone and run `uv sync` then configure MCP.
          files: |
            data/splunk_docs.db
            data/export/splunk_docs_*.db
            data/export/manifest.json
          make_latest: true
