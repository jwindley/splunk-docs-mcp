name: Crawl and release

on:
  schedule:
    - cron: "0 2 * * 0"   # every Sunday at 02:00 UTC
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Main crawl — all sources except ES 8.4/8.3 (those need the 8.5 DB first)
  # ---------------------------------------------------------------------------
  crawl:
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        source:
          - enterprise-security
          - admin-manual
          - splunk-enterprise
          - splunk-cloud
          - soar-on-premises
          - soar-cloud
          - lantern

    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Restore per-source DB cache
        uses: actions/cache/restore@v5
        with:
          path: data/${{ matrix.source }}.db
          key: splunk-db-${{ matrix.source }}-${{ github.run_id }}
          restore-keys: |
            splunk-db-${{ matrix.source }}-

      - name: Crawl ${{ matrix.source }}
        run: uv run splunk-crawl --sources ${{ matrix.source }} --db data/${{ matrix.source }}.db --full

      - name: Save per-source DB cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data/${{ matrix.source }}.db
          key: splunk-db-${{ matrix.source }}-${{ github.run_id }}

      - name: Upload per-source DB artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: db-${{ matrix.source }}
          path: data/${{ matrix.source }}.db
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Derived crawl — ES 8.4 and 8.3, seeded from the 8.5 DB via URL substitution.
  # Runs after the main crawl so the enterprise-security (8.5) artifact is available.
  # ---------------------------------------------------------------------------
  crawl-derived:
    needs: [crawl]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        source:
          - enterprise-security-8-4
          - enterprise-security-8-3

    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Restore per-source DB cache
        uses: actions/cache/restore@v5
        with:
          path: data/${{ matrix.source }}.db
          key: splunk-db-${{ matrix.source }}-${{ github.run_id }}
          restore-keys: |
            splunk-db-${{ matrix.source }}-

      - name: Download enterprise-security (8.5) DB for URL derivation
        # continue-on-error so the crawl still runs (with BFS seeds only) if
        # the 8.5 job failed and didn't upload an artifact.
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: db-enterprise-security
          path: data/

      - name: Crawl ${{ matrix.source }}
        run: |
          uv run splunk-crawl \
            --sources ${{ matrix.source }} \
            --db data/${{ matrix.source }}.db \
            --full \
            --derive-db data/enterprise-security.db

      - name: Save per-source DB cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data/${{ matrix.source }}.db
          key: splunk-db-${{ matrix.source }}-${{ github.run_id }}

      - name: Upload per-source DB artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: db-${{ matrix.source }}
          path: data/${{ matrix.source }}.db
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Aggregation — merge all per-source DBs, export, release
  # ---------------------------------------------------------------------------
  merge-and-release:
    needs: [crawl, crawl-derived]
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Download all per-source DB artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: db-*
          merge-multiple: true
          path: data/

      - name: Merge per-source DBs
        run: |
          DBS=""
          for src in enterprise-security enterprise-security-8-4 enterprise-security-8-3 \
                     admin-manual splunk-enterprise splunk-cloud soar-on-premises soar-cloud lantern; do
            if [ -f "data/${src}.db" ]; then
              DBS="$DBS data/${src}.db"
            else
              echo "Warning: data/${src}.db not found — skipping (crawl job may have failed)"
            fi
          done
          if [ -z "$DBS" ]; then
            echo "ERROR: no source DBs found — cannot build release"
            exit 1
          fi
          uv run splunk-merge $DBS --output data/splunk_docs.db

      - name: Export per-source DBs and manifest
        run: uv run splunk-merge --export-sources data/export/ --db data/splunk_docs.db

      - name: Set release tag
        id: tag
        run: echo "tag=data-$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Splunk docs index — ${{ steps.tag.outputs.tag }}"
          body: |
            Automated weekly crawl of Splunk documentation.

            **Sources indexed:**
            - Splunk Enterprise Security 8.3, 8.4, 8.5
            - Splunk Enterprise 10.2
            - Splunk Cloud Platform 10.3.2512
            - Splunk Configuration File Reference 10.2
            - Splunk SOAR On-Premises 8.5.0
            - Splunk SOAR Cloud (current)
            - Splunk Lantern (current)

            **Downloads:**
            - `splunk_docs.db` — full merged index (all sources)
            - `splunk_docs_<source>.db` — per-source indexes for selective download
            - `manifest.json` — source list with page counts and file sizes

            Run `uv run splunk-setup` to download the merged index automatically,
            or clone and run `uv sync` then configure MCP.
          files: |
            data/splunk_docs.db
            data/export/splunk_docs_*.db
            data/export/manifest.json
          make_latest: true
