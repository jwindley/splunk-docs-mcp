name: Crawl and release

on:
  schedule:
    - cron: "0 2 * * 0"   # every Sunday at 02:00 UTC
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Version discovery — detect current Splunk product versions before crawling.
  # Updates versions.json via static HTML version selectors on help.splunk.com.
  # Commits the updated file so future runs pick it up automatically.
  # Uploads versions.json as an artifact so downstream crawl jobs use it
  # without waiting for the commit to propagate through checkout.
  # continue-on-error: crawl jobs proceed with last-known-good versions on failure.
  # ---------------------------------------------------------------------------
  discover-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Discover versions
        run: uv run splunk-discover-versions

      - name: Update README versions table
        run: python3 scripts/update_readme_versions.py

      - name: Commit versions.json and README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json README.md
          git diff --staged --quiet || (git commit -m "chore: update versions [skip ci]" && git push)

      - name: Upload versions.json artifact
        uses: actions/upload-artifact@v7
        with:
          name: versions-json
          path: versions.json
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Main crawl — all sources except ES 8.4/8.3 (those need the 8.5 DB first)
  # ---------------------------------------------------------------------------
  crawl:
    needs: [discover-versions]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        source:
          - enterprise-security
          - admin-manual
          - splunk-enterprise
          - splunk-cloud
          - rest-api-reference
          - rest-api-cloud
          - soar-on-premises
          - soar-cloud
          - lantern

    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Download versions.json from discovery job
        # continue-on-error: uses repo's versions.json as fallback if discovery failed.
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: versions-json

      - name: Restore per-source DB cache
        uses: actions/cache/restore@v5
        with:
          path: data/${{ matrix.source }}.db
          key: splunk-db-${{ matrix.source }}-${{ github.run_id }}
          restore-keys: |
            splunk-db-${{ matrix.source }}-

      - name: Crawl ${{ matrix.source }}
        run: uv run splunk-crawl --sources ${{ matrix.source }} --db data/${{ matrix.source }}.db --full

      - name: Save per-source DB cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data/${{ matrix.source }}.db
          key: splunk-db-${{ matrix.source }}-${{ github.run_id }}

      - name: Upload per-source DB artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: db-${{ matrix.source }}
          path: data/${{ matrix.source }}.db
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Derived crawl — older versions seeded from current-version DB via URL substitution.
  # Runs after the main crawl so parent source artifacts are available.
  # derive_db: source_id of the parent source whose DB to use for URL derivation.
  # ---------------------------------------------------------------------------
  crawl-derived:
    needs: [crawl, discover-versions]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: enterprise-security-n1
            derive_db: enterprise-security
          - source: enterprise-security-n2
            derive_db: enterprise-security
          - source: admin-manual-n1
            derive_db: admin-manual
          - source: splunk-enterprise-n1
            derive_db: splunk-enterprise
          - source: splunk-cloud-n1
            derive_db: splunk-cloud
          - source: soar-on-premises-n1
            derive_db: soar-on-premises

    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Download versions.json from discovery job
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: versions-json

      - name: Restore per-source DB cache
        uses: actions/cache/restore@v5
        with:
          path: data/${{ matrix.source }}.db
          key: splunk-db-${{ matrix.source }}-${{ github.run_id }}
          restore-keys: |
            splunk-db-${{ matrix.source }}-

      - name: Download parent source DB for URL derivation
        # continue-on-error so the crawl still runs (with BFS seeds only) if
        # the parent job failed and didn't upload an artifact.
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: db-${{ matrix.derive_db }}
          path: data/

      - name: Crawl ${{ matrix.source }}
        run: |
          uv run splunk-crawl \
            --sources ${{ matrix.source }} \
            --db data/${{ matrix.source }}.db \
            --full \
            --derive-db data/${{ matrix.derive_db }}.db

      - name: Save per-source DB cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data/${{ matrix.source }}.db
          key: splunk-db-${{ matrix.source }}-${{ github.run_id }}

      - name: Upload per-source DB artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: db-${{ matrix.source }}
          path: data/${{ matrix.source }}.db
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Aggregation — merge all per-source DBs, export, release
  # ---------------------------------------------------------------------------
  merge-and-release:
    needs: [crawl, crawl-derived]
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Download all per-source DB artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: db-*
          merge-multiple: true
          path: data/

      - name: Verify primary sources succeeded
        run: |
          # Check file existence and minimum page counts.
          # Page count guard prevents publishing a release that contains a near-empty DB
          # from a cache-miss + crawl failure (e.g. all seeds returning 403).
          check_source() {
            local src=$1 min=$2
            if [ ! -f "data/${src}.db" ]; then
              echo "  FAIL ${src}: DB file missing"
              return 1
            fi
            local count
            count=$(sqlite3 "data/${src}.db" \
              "SELECT COUNT(*) FROM documents WHERE source='${src}' AND chunk_of IS NULL;" \
              2>/dev/null || echo 0)
            if [ "$count" -lt "$min" ]; then
              echo "  FAIL ${src}: only ${count} pages (minimum ${min})"
              return 1
            fi
            echo "  OK   ${src}: ${count} pages"
            return 0
          }

          FAILED=0
          check_source enterprise-security  400  || FAILED=1
          check_source admin-manual         100  || FAILED=1
          check_source splunk-enterprise   1500  || FAILED=1
          check_source splunk-cloud        1000  || FAILED=1
          check_source rest-api-reference    50   || FAILED=1
          check_source rest-api-cloud        50   || FAILED=1
          check_source soar-on-premises     200  || FAILED=1
          check_source soar-cloud           200  || FAILED=1
          check_source lantern              500  || FAILED=1

          if [ "$FAILED" -ne 0 ]; then
            echo "ERROR: one or more primary sources failed checks — aborting release"
            exit 1
          fi

      - name: Merge per-source DBs
        run: |
          DBS=""
          for src in enterprise-security enterprise-security-n1 enterprise-security-n2 \
                     admin-manual admin-manual-n1 \
                     splunk-enterprise splunk-enterprise-n1 \
                     splunk-cloud splunk-cloud-n1 \
                     rest-api-reference rest-api-cloud \
                     soar-on-premises soar-on-premises-n1 soar-cloud lantern; do
            if [ -f "data/${src}.db" ]; then
              DBS="$DBS data/${src}.db"
            else
              echo "Warning: data/${src}.db not found — skipping (crawl job may have failed)"
            fi
          done
          if [ -z "$DBS" ]; then
            echo "ERROR: no source DBs found — cannot build release"
            exit 1
          fi
          uv run splunk-merge $DBS --output data/splunk_docs.db

      - name: Export per-source DBs and manifest
        run: uv run splunk-merge --export-sources data/export/ --db data/splunk_docs.db

      - name: Set release tag
        id: tag
        run: echo "tag=data-$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Splunk docs index — ${{ steps.tag.outputs.tag }}"
          body: |
            Automated weekly crawl of Splunk documentation.

            **Sources indexed:**
            - Splunk Enterprise Security 8.3, 8.4, 8.5
            - Splunk Enterprise 10.0, 10.2
            - Splunk Cloud Platform 10.2.2510, 10.3.2512
            - Splunk Configuration File Reference 10.0, 10.2
            - Splunk Enterprise REST API Reference 10.2
            - Splunk Cloud Platform REST API Reference 10.3.2512
            - Splunk SOAR On-Premises 8.5.0, 8.4.0
            - Splunk SOAR Cloud (current)
            - Splunk Lantern (current)

            **Downloads:**
            - `splunk_docs.db` — full merged index (all sources)
            - `splunk_docs_<source>.db` — per-source indexes for selective download
            - `manifest.json` — source list with page counts and file sizes

            Run `uv run splunk-setup` to download the merged index automatically,
            or clone and run `uv sync` then configure MCP.
          files: |
            data/splunk_docs.db
            data/export/splunk_docs_*.db
            data/export/manifest.json
          make_latest: true
